# GitLab CI/CD Pipeline
#
# MR-first release workflow:
#   - MR pipelines: lint + test + build (quality gate before merge)
#   - Push to main: auto-tag job creates v<version> tag when manifest.json changes
#   - Tag pipelines: validate version → build → publish release
#
# Mirrors the GitHub Actions workflows:
#   - pr-validation.yml  →  mr-validate job
#   - release.yml        →  validate-version / build / publish jobs (tag-triggered)
#
# Notable differences from GitHub Actions:
#   - Release assets are uploaded to the GitLab Generic Package Registry and
#     linked to the release (GitLab has no equivalent of GitHub artifact uploads
#     directly attached to releases).
#   - GitLab Releases have no "pre-release" flag; a pre-release version is
#     indicated by appending " (pre-release)" to the release name.
#   - Tag creation uses RELEASE_TOKEN (a project/group access token with
#     write_repository scope, stored as a protected CI/CD variable).

stages:
  - validate
  - build
  - release

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE == 'push'
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'web'

# ─────────────────────────────────────────────────────────────────────────────
# MR Validation
# Runs on every merge request targeting main: lint → test → build.
# ─────────────────────────────────────────────────────────────────────────────

mr-validate:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'
  script:
    - npm ci
    - npm run lint
    - npm run test:coverage
    - npm run build

# ─────────────────────────────────────────────────────────────────────────────
# E2E Static Validation
# Validates e2e TypeScript, fixture JSON, Dataview cache, and Playwright config.
# Runs only when e2e-related files change (or on manual trigger).
# ─────────────────────────────────────────────────────────────────────────────

e2e-validate:
  stage: validate
  script:
    - npm ci
    - npx tsc --noEmit --project e2e/tsconfig.json
    - node scripts/validate-e2e-fixtures.js
    - npx playwright test --list --config e2e/playwright.config.ts
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'
      changes:
        - e2e/**/*
        - scripts/validate-e2e-fixtures.js
        - package.json
        - package-lock.json
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE == 'push'
      changes:
        - e2e/**/*
        - scripts/validate-e2e-fixtures.js
        - package.json
        - package-lock.json
    - if: $CI_PIPELINE_SOURCE == 'web'

# ─────────────────────────────────────────────────────────────────────────────
# Auto-tag
# Runs on push to main when manifest.json changes (i.e. after a release MR merges).
# Reads the version from manifest.json and creates a v<version> tag via the
# GitLab API using RELEASE_TOKEN. Idempotent — skips silently if tag exists.
#
# Prerequisite: add a CI/CD variable named RELEASE_TOKEN in
# Settings → CI/CD → Variables: a project or group access token with
# Developer+ role and write_repository scope, marked as Protected.
# ─────────────────────────────────────────────────────────────────────────────

auto-tag:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      set -eu
      VERSION=$(cat manifest.json | sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' | head -1)
      [ -n "$VERSION" ] || { echo "ERROR: Could not extract version from manifest.json"; exit 1; }
      TAG="v${VERSION}"
      echo "Detected version: $VERSION"
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
        --header "PRIVATE-TOKEN: $RELEASE_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/${TAG}")
      if [ "$HTTP_CODE" = "200" ]; then
        echo "Tag $TAG already exists — skipping auto-tag"
        exit 0
      fi
      echo "Creating tag $TAG at $CI_COMMIT_SHA …"
      curl --fail -X POST \
        --header "PRIVATE-TOKEN: $RELEASE_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"tag_name\": \"$TAG\", \"ref\": \"$CI_COMMIT_SHA\"}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags"
      echo "Created tag $TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - manifest.json

# ─────────────────────────────────────────────────────────────────────────────
# Tag Pipeline — validate, build, publish
# All three jobs run only on v* tags created by the auto-tag job (or manually).
# ─────────────────────────────────────────────────────────────────────────────

# Quality gate for the tag pipeline. Ensures lint and tests pass even when a
# tag is created manually (bypassing the MR workflow).
lint-and-test:
  stage: validate
  script:
    - npm ci
    - npm run lint
    - npm run test:coverage
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# Verify the tag name matches the version in manifest.json.
validate-version:
  stage: validate
  script:
    - |
      set -euo pipefail
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
      if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
        echo "ERROR: Tag version '$TAG_VERSION' does not match manifest.json version '$MANIFEST_VERSION'"
        exit 1
      fi
      echo "Version match: $MANIFEST_VERSION"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# Build the plugin. Requires both quality gate and version validation to pass.
build:
  stage: build
  needs: [lint-and-test, validate-version]
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - main.js
      - manifest.json
      - styles.css
    when: on_success
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# Upload artefacts to the Generic Package Registry and create a GitLab Release.
publish:
  stage: release
  needs: [lint-and-test, validate-version, build]
  script:
    - |
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG#v}"
      IS_PRERELEASE="false"
      echo "$VERSION" | grep -q '-' && IS_PRERELEASE="true"

      BASE_PKG_URL="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/release/$CI_COMMIT_TAG"

      for FILE in main.js manifest.json styles.css; do
        echo "Uploading $FILE …"
        curl --fail --max-time 30 --retry 3 --request PUT \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$FILE" \
          "$BASE_PKG_URL/$FILE"
      done

      # Extract release notes from CHANGELOG.md (the section for this version)
      awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/ && found{exit} found{print}' CHANGELOG.md > /tmp/release-notes.md
      if [ ! -s /tmp/release-notes.md ]; then
        echo "Release $CI_COMMIT_TAG" > /tmp/release-notes.md
      fi

      node -e "
        const fs   = require('fs');
        const tag  = process.env.CI_COMMIT_TAG;
        const ver  = tag.replace(/^v/, '');
        const pre  = '$IS_PRERELEASE' === 'true';
        const base = process.env.CI_API_V4_URL
                   + '/projects/' + process.env.CI_PROJECT_ID
                   + '/packages/generic/release/' + tag;

        const payload = {
          tag_name:    tag,
          name:        pre ? tag + ' (pre-release)' : tag,
          description: fs.readFileSync('/tmp/release-notes.md', 'utf8'),
          assets: {
            links: [
              { name: 'main.js',       url: base + '/main.js',       link_type: 'package' },
              { name: 'manifest.json', url: base + '/manifest.json', link_type: 'package' },
              { name: 'styles.css',    url: base + '/styles.css',    link_type: 'package' },
            ]
          }
        };
        process.stdout.write(JSON.stringify(payload));
      " > /tmp/release_payload.json

      echo "Creating GitLab Release $CI_COMMIT_TAG …"
      curl --fail --max-time 30 --retry 3 --request POST \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data @/tmp/release_payload.json \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
      echo "GitLab Release $CI_COMMIT_TAG created."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
