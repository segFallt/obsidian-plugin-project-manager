name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        id: filter
        with:
          filters: |
            e2e:
              - 'e2e/**'
              - 'scripts/validate-e2e-fixtures.js'
              - 'package.json'
              - 'package-lock.json'

  e2e-validate:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (e2e)
        run: npx tsc --noEmit --project e2e/tsconfig.json

      - name: Validate e2e fixtures
        run: node scripts/validate-e2e-fixtures.js

      - name: Playwright test enumeration
        run: npx playwright test --list --config e2e/playwright.config.ts
