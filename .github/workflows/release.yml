name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Quality gate — fail before any release work if code is broken
      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage

      # Extract version from manifest.json (source of truth)
      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect release type
        id: release_type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release version: $VERSION"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected stable version: $VERSION"
          fi

      # Three-state check: no tag/release, tag only, or both already exist
      - name: Check release state
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice (tag + release already exist)
        if: steps.release_state.outputs.tag_exists == 'true' && steps.release_state.outputs.release_exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} and its GitHub Release already exist."
          echo "No release action needed for this merge. Bump the version in manifest.json to trigger a new release."

      # Build only when a release will actually be published
      - name: Build
        if: steps.release_state.outputs.release_exists == 'false'
        run: npm run build

      - name: Create annotated tag
        if: steps.release_state.outputs.tag_exists == 'false' && steps.release_state.outputs.release_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.release_state.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release_type.outputs.is_prerelease != 'true' }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
